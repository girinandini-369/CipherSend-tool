<!doctype html>
<html>
<head>
<title>CipherSend 🔐</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>CipherSend 🔐</h1>

<form method="post" enctype="multipart/form-data" action="/encrypt">
<h3>Encrypt File</h3>
<input type="file" name="file" required>
<input type="password" name="password" placeholder="Secret key" required>
<input type="submit" value="Encrypt">
</form>

<form method="post" enctype="multipart/form-data" action="/decrypt">
<h3>Decrypt File</h3>
<input type="file" name="file" required>
<input type="password" name="password" placeholder="Secret key" required>
<input type="submit" value="Decrypt">
</form>

{% if msg %}
<div class="msg {{ category }}">{{ msg }}
{% if link %}<a class="download" href="{{ link }}">Download 📥</a>{% endif %}
</div>{% endif %}
</body>
</html>
